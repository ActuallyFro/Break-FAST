<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban SPA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
      .buckets {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: wrap;
        /* flex-direction: column; */
        height: 100vh;
        margin: 0;
        display: flex;
        flex-wrap: nowrap;
        flex-grow: 1;
        overflow: auto;
      }
      /*  -----------------------  */
      .bucket {
        flex: 1;
        width: 25%;
        height: 100%;
        position: relative;
        box-sizing: border-box;
        padding: 1rem;
        border: 1px solid #ccc;
      }
      .bucket h2 {
        margin: 0 0 1rem;
        font-size: 1.2rem;
      }
      .bucket h2 .counter {
        font-size: 1rem;
        font-weight: normal;
        margin-left: 0.5rem;
      }

      .controls {
        /* display: flex; */
        align-items: right;
        justify-content: space-between;
        padding: 1rem;
      }

      /*  -----------------------  */
      .container {
        max-height: calc(100% - 3rem);
        overflow-y: auto;
      }

      .card {
        padding: 0.5rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f0f0f0;
        margin-bottom: 0.5rem;
        position: relative;
        cursor: move;
        transition: transform 120ms ease, opacity 120ms ease;
      }
      .card.dragging {
        opacity: 0.8;
        transform: scale(0.99);
      }
      .card-body {
        display: none;
        margin-top: 0.5rem;
        white-space: pre-wrap;
      }

      /* Highlight bucket while dragging over */
      .bucket.drag-over {
        box-shadow: inset 0 0 0 2px rgba(0,0,0,0.06);
      }
      .card:hover .card-body {
        display: block;
      }
      .card.disable-hover .card-body {
        display: block;
      }
      .move-left,
      .move-right {
        position: absolute;
        top: 1rem;
        font-size: 1.5rem;
        cursor: pointer;
      }
      .move-left {
        right: 4rem;
      }
      .move-right {
        right: 3rem;
      }
      .x-to-remove-bucket {
        position: absolute;
        top: 1rem;
        right: 1rem;
        font-size: 0.75rem;
        cursor: pointer;
      }

      .plus {
        position: absolute;
        top: 2rem;
        right: 1rem;
        font-size: 1.5rem;
      }
      /*  -----------------------  */
      .minus {
        position: absolute;
        top: 0;
        right: 15px;
        font-size: 1.4rem;
        cursor: pointer;
      }

      /* Short ID badge: subtle when empty, highlighted when assigned */
      .card-id-badge {
        position: absolute;
        top: 0.25rem;
        right: 40px; /* left of the '-' icon */
        font-size: 0.75rem;
        padding: 2px 6px;
        border-radius: 3px;
        background: transparent; /* subtle for empty state */
        color: rgba(0,0,0,0.6);
        cursor: pointer;
        display: inline-block;
        min-width: 24px;
        text-align: center;
        transition: background 180ms ease, color 180ms ease;
      }

      .card-id-badge.has-id {
        background: rgba(0,0,0,0.06);
        color: inherit;
      }

      input[type="text"] {
        font-family: inherit;
        font-size: inherit;
        background-color: transparent;
        border: none;
        outline: none;
        width: 100%;
      }
      input[type="text"]:focus {
        outline: auto;
      }

      /*  -----------------------  */
      .gear-icon {
        margin-left: 0.5rem;
        cursor: pointer;
      }

      /* Ensure interactive child icons show pointer and are clickable (override .card cursor:move) */
      .card .view-as-html,
      .card .edit,
      .card .lock,
      .card .gear-icon,
      .card .minus,
      .card .card-id-badge,
      .plus {
        cursor: pointer;
        pointer-events: auto;
      }

      .color-picker {
        display: none;
        margin-left: 0.5rem;
      }

      .dark-mode {
        background-color: #222;
        color: #eee;
      }

      .dark-mode .card {
        background-color: #444;
        color: #fff;
      }

      .dark-mode .bucket {
        border-color: #555;
      }

      .dark-mode input[type="text"],
      .dark-mode textarea {
        background-color: #333;
        color: #fff;
      }

      textarea.card-body {
        width: 100%;
        min-height: 50px;
        font-family: inherit;
        resize: vertical;
      }

      /* Bottom Tool Bar for Loading JSON/other Cards */
      .bottom-toolbar {
        margin-top: 10px;
        padding: 10px;
        border-top: 1px solid #ccc;
        display: flex;
        flex-direction: column;
        width: 100%;
      }

      .json-input-container {
        margin-top: 10px;
        display: none;
      }

      .json-textarea {
        width: 100%;
        min-height: 100px;
        margin-bottom: 10px;
        font-family: monospace;
      }

      .button-container {
        display: flex;
        gap: 10px;
      }

      .dark-mode .json-textarea {
        background-color: #333;
        color: #fff;
      }

    </style>
</head>
<body>
  <h1 id="boardTitle" class="board-title">Kanban Board</h1>
  <div class="buckets" id="buckets"></div>
<br/>
  <hr id="Tool-Line">
  <div class="controls">
      <button id="addBucketButton">Add Bucket</button>
      <button id="exportButton">Export</button>
      <button id="importBtn">Import</button>
      <label style="margin-left: 2rem;">
        <input type="checkbox" id="darkModeToggle"> Darkmode
      </label>
      <input type="file" id="importButton" style="display:none">
      <button id="resetButton">Reset LocalStorage</button>
  </div>

  <script>
    // UUID generation function - RFC 9562 
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // Short ID generator (7 hex chars, uppercase) — used for user-assigned visible IDs
    function generateShortId() {
      const arr = new Uint8Array(8);
      if (window.crypto && crypto.getRandomValues) {
        crypto.getRandomValues(arr);
      } else {
        for (let i = 0; i < arr.length; i++) arr[i] = Math.floor(Math.random() * 256);
      }
      return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('').slice(0,7).toUpperCase();
    }

    // --------------------
    // Board Title Functions
    function makeBoardTitleEditable() {
      const title = document.getElementById("boardTitle");
      title.addEventListener("click", (e) => {
        const target = e.target;
        const input = document.createElement("input");
        input.type = "text";
        input.value = target.textContent;
        input.id = "boardTitle";
        input.className = "board-title";
        input.style.width = "100%";
        target.replaceWith(input);
        input.focus();

        input.addEventListener("blur", () => {
          target.textContent = input.value;
          input.replaceWith(target);
          localStorage.setItem("boardTitle", target.textContent);
        });
      });
    }

    // Load the board title from LocalStorage during initialization
    function loadBoardTitleFromLocalStorage() {
      const savedTitle = localStorage.getItem("boardTitle");
      if (savedTitle) {
        const titleElement = document.getElementById("boardTitle");
        titleElement.textContent = savedTitle;
      }
    }

    // --------------------
    // localStorage Functions
    function saveToLocalStorage() {
      const bucketsData = [];
      document.querySelectorAll(".bucket").forEach((bucket, index) => {
        const cards = Array.from(bucket.querySelectorAll(".card"));
        const cardsData = cards.map(card => {
          const colorInput = card.querySelector("input[type='color']");
          const cardBody = card.querySelector(".card-body");
          const bodyContent = cardBody.tagName === "TEXTAREA" ? cardBody.value : cardBody.innerHTML;
          
          // Get existing UUID or generate a new one
          let uuid = card.getAttribute("data-uuid");
          if (!uuid) {
            uuid = generateUUID();
            card.setAttribute("data-uuid", uuid);
          }
          
          return {
            label: card.querySelector("input[type='text']").value,
            body: bodyContent,
            isTextarea: cardBody.tagName === "TEXTAREA",
            color: colorInput ? colorInput.value : null,
            uuid: uuid,
            shortId: card.getAttribute("data-short-id") || null,
            collapsed: cardBody.classList.contains('collapsed'),
            height: cardBody.style.height || ''
          }; 
        });
        const titleElement = bucket.querySelector(".title");
        const title = titleElement.tagName === "INPUT" ? titleElement.value : titleElement.textContent;
        bucketsData[index] = {
          title: title,
          cards: cardsData
        };
      });
      localStorage.setItem("kanbanBoard", JSON.stringify(bucketsData));
    }


    function loadFromLocalStorage() {
      document.querySelectorAll(".bucket").forEach(bucket => bucket.remove());

      const bucketsData = JSON.parse(localStorage.getItem("kanbanBoard"));
      if (bucketsData) {
        bucketsData.forEach((bucketData, index) => {
          let bucket = document.querySelectorAll(".bucket")[index];
          if (!bucket) {
            createBucket(bucketData.title);
            bucket = document.querySelectorAll(".bucket")[index];
          }
          const container = bucket.querySelector(".container");
          const title = bucket.querySelector(".title");
          title.textContent = bucketData.title;
          makeBucketTitleEditable(title);
          
          bucketData.cards.forEach(cardData => {
            const card = createCard();
            card.querySelector("input[type='text']").value = cardData.label;
            
            // Set UUID
            if (cardData.uuid) {
              card.setAttribute("data-uuid", cardData.uuid);
            } else {
              card.setAttribute("data-uuid", generateUUID());
            }

            // Apply Color
            if (cardData.color) {
              card.style.backgroundColor = cardData.color;
              const colorInput = card.querySelector("input[type='color']");
              if (colorInput) colorInput.value = cardData.color;
            }

            // Short ID Badge
            const idBadge = card.querySelector(".card-id-badge");
            if (idBadge) {
              if (cardData.shortId) {
                card.setAttribute("data-short-id", cardData.shortId);
                idBadge.textContent = cardData.shortId;
                idBadge.title = "Click to remove ID; Ctrl+Click to insert; Shift+Click to copy";
                idBadge.classList.add('has-id');
              } else {
                idBadge.textContent = '[]';
                idBadge.title = 'Add ID';
                idBadge.classList.remove('has-id');
              }
            }

            // --- Restore State ---
            let cardBody = card.querySelector(".card-body"); // Default is textarea created by createCard
            
            // 1. Mode (Textarea vs Div)
            if (cardData.isTextarea) {
              // It is already a textarea (default). Just set value.
              cardBody.value = cardData.body || '';
            } else {
              // Needs to be a DIV
              const div = document.createElement("div");
              div.className = "card-body";
              div.innerHTML = cardData.body || '';
              // Enable text selection without dragging card
              ['mousedown','touchstart','pointerdown'].forEach(ev => div.addEventListener(ev, e => e.stopPropagation()));
              
              div.style.display = 'block'; 
              
              cardBody.replaceWith(div);
              cardBody = div;
            }

            // 2. Height
            if (cardData.height) {
              cardBody.style.height = cardData.height;
            }

            // 3. Collapsed (Eye)
            if (cardData.collapsed) {
              cardBody.classList.add('collapsed');
              cardBody.style.display = 'none';
              const eyeIcon = card.querySelector('.eye-icon');
              if (eyeIcon) {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash'); // Closed eye
              }
            }

            const container = bucket.querySelector(".container");
            container.appendChild(card);
            updateCardCount(bucket, 1);
          });
        });
      }
    }


    function resetLocalStorage() {
      if (!confirm("Are you sure you want to reset the board and clear local storage? This cannot be undone.")) {
        return;
      }
      localStorage.removeItem("kanbanBoard");
      localStorage.removeItem("boardTitle");
      localStorage.removeItem("darkMode");
      location.reload();
    }

    //==============================================================================================================
    // Bucket and Card Functions

    // --------------------
    // Buckets

    function resizeWidthBuckets(){
      const bucketCount = document.querySelectorAll(".bucket").length;

      const bucketWidth = 100 / (bucketCount + 1);
      document.querySelectorAll(".bucket").forEach(bucket => {
          bucket.style.width = `${bucketWidth}%`;
      });  
    }

    function createBucket(bucketName="New Bucket") {
      const bucketCount = document.querySelectorAll(".bucket").length;

      const bucket = document.createElement('div');
      bucket.classList.add("bucket");
      bucket.setAttribute("id", `b${bucketCount + 1}`);

      const bucketTemplate = `
          <h2><span class="title" style="display: inline-block;">${bucketName}</span><span class="counter">0</span></h2>
          <span class="move-left">&lt;</span>
          <span class="move-right">&gt;</span>
          <span class="plus">+</span>
          <span class="x-to-remove-bucket">[X]</span>
          <div class="container"></div>
      `;
      bucket.innerHTML = bucketTemplate.trim();
      
      bucket.querySelector(".move-left").addEventListener("click", moveBucketLeft);
      bucket.querySelector(".move-right").addEventListener("click", moveBucketRight);
      bucket.querySelector(".plus").addEventListener("click", addCardButton);
      bucket.querySelector(".x-to-remove-bucket").addEventListener("click", removeBucketButton);

      bucket.addEventListener("dragover", bucketDragOver);
      bucket.addEventListener("drop", bucketDrop);
      bucket.addEventListener("dragenter", bucketDragEnter);
      bucket.addEventListener("dragleave", bucketDragLeave);

      const bucketsElement = document.querySelector(".buckets");
      bucketsElement.insertAdjacentElement("beforeend", bucket);

      resizeWidthBuckets();

      makeAllBucketTitlesEditable();

    }

    function addBucketButton(){
      createBucket();
      saveToLocalStorage();
    }

    function moveBucketLeft(e) {
      const bucket = e.target.closest(".bucket");
      const prevBucket = bucket.previousElementSibling;
      if (prevBucket) {
        bucket.parentElement.insertBefore(bucket, prevBucket);
        saveToLocalStorage();
      }
    }

    function moveBucketRight(e) {
      const bucket = e.target.closest(".bucket");
      const nextBucket = bucket.nextElementSibling;
      if (nextBucket) {
        bucket.parentElement.insertBefore(nextBucket, bucket);
        saveToLocalStorage();
      }
    }

    function addCardButton(e) {
      const bucket = e.target.parentElement;
      const container = bucket.querySelector(".container");
      const card = createCard();
      container.appendChild(card);
      updateCardCount(bucket, 1);
      saveToLocalStorage();
    }

    function removeBucketButton(e) {
      const bucket = e.target.closest(".bucket");
      const titleElement = bucket.querySelector('.title');
      const bucketTitle = titleElement ? titleElement.textContent.trim() : 'this bucket';
      if (!confirm(`Delete bucket "${bucketTitle}" and all its cards? This action cannot be undone.`)) {
        return;
      }
      bucket.remove();
      saveToLocalStorage();

      resizeWidthBuckets();
    }

    function makeBucketTitleEditable(title) {
      title.addEventListener("click", (e) => {
        const target = e.target;
        const input = document.createElement("input");
        input.type = "text";
        input.value = target.textContent;
        input.className = "title";
        input.style.width = "100%";
        target.replaceWith(input);
        input.focus();

        input.addEventListener("blur", () => {
          target.textContent = input.value;
          input.replaceWith(target);
          saveToLocalStorage();
        });
      });
    }

    function makeAllBucketTitlesEditable() {
      document.querySelectorAll(".title").forEach(title => {
        makeBucketTitleEditable(title);
      });
    }

    function moveBucketLeft(e) {
      const bucket = e.target.closest(".bucket");
      const prevBucket = bucket.previousElementSibling;
      if (prevBucket) {
        bucket.parentElement.insertBefore(bucket, prevBucket);
        saveToLocalStorage();
      }
    }

    function bucketDragOver(e) {
      e.preventDefault();
      const container = e.currentTarget.querySelector('.container');
      const dragging = document.querySelector('.dragging');
      if (!container || !dragging) return;

      const afterElement = getDragAfterElement(container, e.clientY);
      if (!afterElement) {
        container.appendChild(dragging);
      } else {
        container.insertBefore(dragging, afterElement);
      }

      // remove highlight from other buckets
      document.querySelectorAll('.bucket').forEach(b => b.classList.remove('drag-over'));
      e.currentTarget.classList.add('drag-over');
    }

    function bucketDrop(e) {
      e.preventDefault();
      const container = e.currentTarget.querySelector(".container");

      // Prefer dataTransfer id, but fall back to the currently dragging element
      const cardId = e.dataTransfer.getData("text");
      let card = document.getElementById(cardId);
      if (!card) card = document.querySelector('.dragging');
      if (!card || !container) return;

      const afterElement = getDragAfterElement(container, e.clientY);
      if (!afterElement) {
        container.appendChild(card);
      } else {
        container.insertBefore(card, afterElement);
      }

      // Counts will be adjusted in dragend where we know the starting bucket
    }

    function bucketDragEnter(e) {
      e.preventDefault();
      // optional visual highlight
      e.currentTarget.classList.add('drag-over');
    }

    function bucketDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    // --------------------
    // Cards

    function createCard() {
      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("draggable", "true");
      const newUuid = generateUUID();
      card.setAttribute("data-uuid", newUuid); 
      card.id = 'card-' + newUuid.slice(0,8);

      const cardLabelInput = document.createElement("input");
      cardLabelInput.addEventListener("input", saveToLocalStorage);
      cardLabelInput.type = "text";
      cardLabelInput.placeholder = "Label...";
      card.appendChild(cardLabelInput);

      const minus = document.createElement("span");
      minus.textContent = "-";
      minus.className = "minus";
      minus.draggable = false;
      minus.addEventListener('mousedown', e => e.stopPropagation());
      minus.addEventListener('touchstart', e => e.stopPropagation());
      minus.addEventListener("click", () => {
          if (!confirm("Delete this card? This action cannot be undone.")) return;
          const bucket = card.parentElement.parentElement;
          card.remove();
          updateCardCount(bucket, -1);
          saveToLocalStorage();
      });
      card.appendChild(minus);

      // --- New Icons Block [Eye] [Lock] [Edit] [Gear] ---

      // 1. Eye Icon (Visibility)
      const eyeIcon = document.createElement("i");
      eyeIcon.className = "fas fa-eye eye-icon";
      eyeIcon.style.marginLeft = "0.5rem";
      eyeIcon.title = "Toggle Content Visibility";
      eyeIcon.draggable = false;
      eyeIcon.addEventListener('mousedown', e => e.stopPropagation());
      eyeIcon.addEventListener('touchstart', e => e.stopPropagation());
      card.appendChild(eyeIcon);

      // 3. Edit Pad Icon (Mode)
      const editPadIcon = document.createElement("i");
      editPadIcon.className = "fas fa-pen-to-square edit-pad-icon"; // FontAwesome 6 style or fa-edit
      // If fa-pen-to-square not available in the set, fallback to fa-edit
      if (!document.querySelector('.fa-pen-to-square')) editPadIcon.className = "fas fa-edit edit-pad-icon";

      editPadIcon.style.marginLeft = "0.5rem";
      editPadIcon.title = "Toggle Edit/View Mode";
      editPadIcon.draggable = false;
      editPadIcon.addEventListener('mousedown', e => e.stopPropagation());
      editPadIcon.addEventListener('touchstart', e => e.stopPropagation());
      card.appendChild(editPadIcon);

      // 4. Gear Icon (Color)
      const gearIcon = document.createElement("i");
      gearIcon.className = "fas fa-gear gear-icon";
      gearIcon.style.marginLeft = "0.5rem";
      gearIcon.draggable = false;
      gearIcon.addEventListener('mousedown', e => e.stopPropagation());
      gearIcon.addEventListener('touchstart', e => e.stopPropagation());
      card.appendChild(gearIcon);

      // Default Card Body
      let cardBody = document.createElement("textarea");
      cardBody.className = "card-body";
      cardBody.placeholder = "Enter description...";
      cardBody.draggable = false;
      // prevent parent drag from stealing focus
      ['mousedown','touchstart','pointerdown'].forEach(ev => cardBody.addEventListener(ev, e => e.stopPropagation()));
      
      // Default state: Editable textarea
      cardBody.style.display = 'block';

      // Attach body
      card.appendChild(cardBody);
      
      // --- Event Handlers ---

      // 1. Eye (Toggle Visibility)
      eyeIcon.addEventListener("click", () => {
        const body = card.querySelector('.card-body');
        if (!body) return;
        const isHidden = body.classList.contains('collapsed');
        
        if (isHidden) {
          // Open
          body.classList.remove('collapsed');
          body.style.display = 'block';
          eyeIcon.classList.remove('fa-eye-slash');
          eyeIcon.classList.add('fa-eye');
        } else {
          // Close
          body.classList.add('collapsed');
          body.style.display = 'none';
          eyeIcon.classList.remove('fa-eye');
          eyeIcon.classList.add('fa-eye-slash');
        }
        saveToLocalStorage();
      });

      // 3. Edit Pad (Toggle Mode)
      editPadIcon.addEventListener("click", () => {
        let currentBody = card.querySelector('.card-body');
        if (!currentBody) return;
        
        // Preserve state
        const isCollapsed = currentBody.classList.contains('collapsed');
        
        let heightVal = currentBody.style.height;
        // If we switch modes, we might want to capture current computed height if explicit height is not set?
        if (!heightVal) {
             heightVal = window.getComputedStyle(currentBody).height;
        }

        if (currentBody.tagName === 'TEXTAREA') {
          // Switch to DIV (View)
          const val = currentBody.value;
          const sanitizedHtml = sanitizeHTML(val); 
          
          const div = document.createElement('div');
          div.className = 'card-body';
          div.innerHTML = sanitizedHtml;
          ['mousedown','touchstart','pointerdown'].forEach(ev => div.addEventListener(ev, e => e.stopPropagation()));
          div.style.display = isCollapsed ? 'none' : 'block';
          
          // Maintain height
          div.style.height = heightVal;
          div.style.overflow = 'auto'; 
          
          if (isCollapsed) div.classList.add('collapsed');

          currentBody.replaceWith(div);
          
          editPadIcon.classList.add('active-mode'); 

        } else {
          // Switch to TEXTAREA (Edit)
          const html = currentBody.innerHTML;
          
          const textarea = document.createElement('textarea');
          textarea.className = 'card-body';
          textarea.value = html; 
          
          textarea.style.display = isCollapsed ? 'none' : 'block';
          textarea.draggable = false;
          textarea.tabIndex = 0;
          ['mousedown','touchstart','pointerdown'].forEach(ev => textarea.addEventListener(ev, e => e.stopPropagation()));
          
          textarea.style.height = heightVal;
          textarea.style.resize = 'vertical';
          
          if (isCollapsed) textarea.classList.add('collapsed');

          currentBody.replaceWith(textarea);
          
          setTimeout(() => { try { textarea.focus(); } catch (err) {} }, 0);
          
          editPadIcon.classList.remove('active-mode');

          textarea.addEventListener("input", saveToLocalStorage);
          // Save height changes on mouseup (resize end)
          textarea.addEventListener("mouseup", saveToLocalStorage);
        }
        saveToLocalStorage();
      });

      // ID badge logic remains similar...
      const idBadge = document.createElement("span");
      idBadge.className = "card-id-badge";
      idBadge.title = "Add ID";
      
      const existingShort = card.getAttribute('data-short-id');
      idBadge.textContent = existingShort ? existingShort : '[]';
      if (existingShort) {
        idBadge.classList.add('has-id');
        idBadge.title = "Click to remove ID; Ctrl+Click to insert; Shift+Click to copy";
      }
      card.appendChild(idBadge);

      idBadge.addEventListener('click', (e) => {
        const existing = card.getAttribute('data-short-id');
        if (!existing) {
          const newId = generateShortId();
          card.setAttribute('data-short-id', newId);
          idBadge.textContent = newId;
          idBadge.title = "Click to remove ID; Ctrl+Click to insert; Shift+Click to copy";
          idBadge.classList.add('has-id');
          saveToLocalStorage();
          return;
        }

        if (e.ctrlKey) {
          const cb = card.querySelector('.card-body');
          if (cb) {
            if (cb.tagName === 'TEXTAREA') {
              cb.value = (cb.value ? cb.value + ' ' : '') + existing;
            } else {
              cb.innerHTML = (cb.innerHTML ? cb.innerHTML + ' ' : '') + existing;
            }
            saveToLocalStorage();
          }
          return;
        }

        if (e.shiftKey) {

    function updateCardCount(bucket, change) {
      const counter = bucket.querySelector(".counter");
      const newCount = parseInt(counter.textContent, 10) + change;
      counter.textContent = newCount;
    }

    function sanitizeHTML(html) {
      const temp = document.createElement("div");
      temp.innerHTML = html;
      const tagsToKeep = ['b', 'u', 'i', 'strike', 'ul', 'li'];
      const tags = temp.getElementsByTagName("*");

      for (let i = tags.length - 1; i >= 0; i--) {
          const tag = tags[i];
          if (tagsToKeep.indexOf(tag.tagName.toLowerCase()) === -1) {
              tag.outerHTML = tag.innerHTML;
          }
      }
      return temp.innerHTML;
    }

    document.addEventListener("dragstart", (e) => {
      if (e.target.classList.contains("card")) {
          e.target.classList.add("dragging");
          e.dataTransfer.setData("text", e.target.id);
          // store the starting bucket id to update counts later
          const startBucket = e.target.parentElement && e.target.parentElement.parentElement ? e.target.parentElement.parentElement.id : null;
          if (startBucket) e.target.dataset.startBucket = startBucket;
      }
    });

    document.addEventListener("dragend", (e) => {
      if (e.target.classList.contains("card")) {
          e.target.classList.remove("dragging");
          // cleanup any bucket highlight
          document.querySelectorAll('.bucket').forEach(b => b.classList.remove('drag-over'));

          const startBucketId = e.target.dataset.startBucket;
          const newBucket = e.target.closest('.bucket');

          if (startBucketId && newBucket && startBucketId !== newBucket.id) {
            const startBucketEl = document.getElementById(startBucketId);
            if (startBucketEl) updateCardCount(startBucketEl, -1);
            updateCardCount(newBucket, 1);
          }
          delete e.target.dataset.startBucket;
      }
      saveToLocalStorage();
    });

    // --------------------
    // Touch Events for Mobile/Touchscreen Devices

    let draggedCard = null;
    let StartingBucket = null;


    document.addEventListener("touchstart", (e) => {
    if (e.target.classList.contains("card")) {
      draggedCard = e.target;
      StartingBucket = draggedCard.parentElement.parentElement;
      if (StartingBucket && StartingBucket.id) draggedCard.dataset.startBucket = StartingBucket.id;
      // make it draggable-like
      draggedCard.classList.add('dragging');
    }
    });

    document.addEventListener("touchmove", (e) => {
    if (draggedCard) {
      e.preventDefault();
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      draggedCard.style.position = "absolute";
      draggedCard.style.left = x + "px";
      draggedCard.style.top = y + "px";

      // While dragging on touch, provide live reordering feedback
      const hit = document.elementFromPoint(x, y);
      const bucket = hit ? hit.closest('.bucket') : null;
      if (bucket) {
        const container = bucket.querySelector('.container');
        const afterElement = getDragAfterElement(container, y);
        if (!afterElement) container.appendChild(draggedCard);
        else container.insertBefore(draggedCard, afterElement);
      }
    }
    });

    document.addEventListener("touchmove", (e) => {
    if (draggedCard) {
      e.preventDefault();
      draggedCard.style.position = "absolute";
      draggedCard.style.left = e.touches[0].clientX + "px";
      draggedCard.style.top = e.touches[0].clientY + "px";
    }
    });

    document.addEventListener("touchend", (e) => {
      if (draggedCard) {
        const touchX = e.changedTouches[0].clientX;
        const touchY = e.changedTouches[0].clientY;
        const hit = document.elementFromPoint(touchX, touchY);
        const bucket = hit ? hit.closest(".bucket") : null;
        if (bucket) {
          const container = bucket.querySelector(".container");
          // find insertion point
          const afterElement = getDragAfterElement(container, touchY);
          if (!afterElement) container.appendChild(draggedCard);
          else container.insertBefore(draggedCard, afterElement);

          const newBucket = draggedCard.parentElement.parentElement;
          const startBucketEl = document.getElementById(draggedCard.dataset.startBucket);
          if (startBucketEl && startBucketEl !== newBucket) {
            updateCardCount(startBucketEl, -1);
            updateCardCount(newBucket, 1);
          }
        }
        draggedCard.style.position = "";
        draggedCard.style.left = "";
        draggedCard.style.top = "";
        draggedCard.classList.remove('dragging');
        draggedCard = null;
        saveToLocalStorage();
      }
    });


function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
      for (const child of draggableElements) {
        const box = child.getBoundingClientRect();
        const childCenter = box.top + box.height / 2;
        if (y < childCenter) {
          return child;
        }
      }
      return null;
    }

    function findBucket(x, y) {
    const buckets = document.querySelectorAll(".bucket");
    for (let i = 0; i < buckets.length; i++) {
      const rect = buckets[i].getBoundingClientRect();
      if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
        return buckets[i];
      }
    }
    return null;
    }

    // Export function
    function exportMatrix() {
      const boardTitle = document.querySelector(".board-title").textContent;

      // Prepare data for export
      const bucketsData = [];
      document.querySelectorAll(".bucket").forEach((bucket, index) => {
        const cards = Array.from(bucket.querySelectorAll(".card"));
        const cardsData = cards.map(card => {
          const colorInput = card.querySelector("input[type='color']");
          const cardBody = card.querySelector(".card-body");
          const bodyContent = cardBody.tagName === "TEXTAREA" ? cardBody.value : cardBody.innerHTML;
          
          return {
            label: card.querySelector("input[type='text']").value,
            body: bodyContent,
            isTextarea: cardBody.tagName === "TEXTAREA",
            color: colorInput ? colorInput.value : null,
            uuid: card.getAttribute("data-uuid") || generateUUID(), // Include UUID in export
            shortId: card.getAttribute('data-short-id') || null,
            locked: cardBody.classList.contains('locked')
          };
        });
        const titleElement = bucket.querySelector(".title");
        const title = titleElement.tagName === "INPUT" ? titleElement.value : titleElement.textContent;
        bucketsData[index] = {
          title: title,
          cards: cardsData
        };
      });

      const data = {
          boardTitle: boardTitle,
          bucketsData: bucketsData,
      };

      const ISOdateTime = new Date().toISOString().replace(/:/g, '-').replace('.', '_');
      const fileName = "Kanban_" + boardTitle.replace(/ /g, "-") + "-" + ISOdateTime + ".json";

      const fileContent = JSON.stringify(data, null, 2);
      const file = new Blob([fileContent], { type: "application/json" });

      const link = document.createElement("a");
      link.href = URL.createObjectURL(file);
      link.download = fileName;
      link.click();
    }

    // Import function
    function importMatrix(event) {
        const input = event.target;

        if (input.files.length === 0) {
            alert('No file selected!');
            return;
        }

        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const fileContent = event.target.result;
            
            try {
                const jsonData = JSON.parse(fileContent);

                console.log("JSON Import size:: " + fileContent.length);
                
                const loadedBoardTitle = jsonData.boardTitle;
                if (loadedBoardTitle) {
                  const titleElement = document.getElementById("boardTitle");
                  titleElement.textContent = loadedBoardTitle;
                  localStorage.setItem("boardTitle", loadedBoardTitle);
                }

                // Update the buckets data
                const bucketsData = jsonData.bucketsData;
                if (bucketsData) {
                    localStorage.setItem("kanbanBoard", JSON.stringify(bucketsData));
                    location.reload();
                } else {
                    alert('Invalid file format!');
                }
            } catch (error) {
                alert('Error parsing JSON file: ' + error.message);
            }
        };

        reader.onerror = () => {
            alert('Error reading file!');
        };

        reader.readAsText(file);
    }
