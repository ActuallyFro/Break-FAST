<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPG Graph Editor</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#21262d;--bg3:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--accent2:#1f6feb;--accent-glow:rgba(88,166,255,.25);
  --green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#a371f7;
  --node-default:#1f6feb;--node-ring:#58a6ff;
  --edge:#58a6ff;--edge-sel:#f0883e;
  --sel-fill:rgba(88,166,255,.12);--sel-stroke:#58a6ff;
  --font-mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --font-ui:'IBM Plex Sans','Segoe UI',sans-serif;
  --radius:6px;--radius2:10px;
  --toolbar-h:42px;--inspector-w:300px;--drawer-h:220px;
  --transition:.15s ease;
  --grid-dot-color: rgba(255,255,255,0.07);
}

body.light-mode {
  --bg0:#f6f8fa;--bg1:#ffffff;--bg2:#f3f4f6;--bg3:#e5e7eb;
  --border:#d1d5db;--border2:#9ca3af;
  --text:#1f2937;--text2:#4b5563;--text3:#9ca3af;
  --accent:#2563eb;--accent2:#1d4ed8;--accent-glow:rgba(37,99,235,0.15);
  --node-default:#2563eb;--node-ring:#3b82f6;
  --edge:#3b82f6;--edge-sel:#f97316;
  --sel-fill:rgba(59,130,246,0.08);--sel-stroke:#2563eb;
  --grid-dot-color: rgba(0,0,0,0.08);
}

html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--font-ui);font-size:13px}

/* ── LAYOUT ───────────────────────────────────────────────────── */
#app{display:grid;grid-template-rows:var(--toolbar-h) 1fr auto;grid-template-columns:1fr var(--inspector-w);height:100vh}
#toolbar{grid-column:1/-1;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 10px;user-select:none;z-index:10}
#canvas-wrap{position:relative;overflow:hidden;background:var(--bg0);grid-row:2;grid-column:1}
#svg-canvas{width:100%;height:100%;display:block;cursor:default}
#inspector{grid-row:2;grid-column:2;background:var(--bg1);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
#drawer{grid-column:1/-1;background:var(--bg1);border-top:1px solid var(--border);height:var(--drawer-h);display:flex;flex-direction:column;transition:height var(--transition)}
#drawer.collapsed{height:28px}

/* ── TOOLBAR ──────────────────────────────────────────────────── */
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid transparent;border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font-ui);white-space:nowrap;transition:all var(--transition)}
.tb-btn:hover{background:var(--bg2);border-color:var(--border);color:var(--text)}
.tb-btn.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.tb-btn.danger:hover{background:rgba(248,81,73,.15);border-color:var(--red);color:var(--red)}
.tb-btn svg{width:14px;height:14px;flex-shrink:0}
.tb-label{color:var(--text3);font-size:11px;font-family:var(--font-mono);padding:0 4px}
#toolbar-title{font-family:var(--font-mono);font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.05em;margin-right:6px}
.tb-spacer{flex:1}
#zoom-display{font-family:var(--font-mono);font-size:11px;color:var(--text3);padding:0 6px;min-width:50px;text-align:right}

/* ── TOOL MODES ───────────────────────────────────────────────── */
body[data-tool="node"] #svg-canvas{cursor:crosshair}
body[data-tool="edge"] #svg-canvas{cursor:cell}
body[data-tool="select"] #svg-canvas{cursor:default}
body[data-tool="pan"] #svg-canvas{cursor:grab}
body[data-tool="pan"].panning #svg-canvas{cursor:grabbing}

/* ── SVG GRAPH ELEMENTS ───────────────────────────────────────── */
.node-group{cursor:pointer}
.node-group .node-circle{fill:var(--node-default);stroke:var(--node-ring);stroke-width:1.5;transition:filter .1s}
.node-group.selected .node-circle{stroke:#fff;stroke-width:2.5;filter:drop-shadow(0 0 8px var(--accent-glow))}
.node-group.orphan .node-circle{stroke:var(--orange);stroke-dasharray:4 2}
.node-group .node-label{fill:var(--text);font-family:var(--font-ui);font-size:11px;text-anchor:middle;dominant-baseline:central;pointer-events:none;user-select:none}
.edge-line{stroke:var(--edge);stroke-width:1.5;fill:none;cursor:pointer;transition:stroke .1s}
.edge-line.selected{stroke:var(--edge-sel);stroke-width:2.5}
.edge-line:hover{stroke:var(--accent);stroke-width:2}
.edge-label-text{fill:var(--text2);font-family:var(--font-ui);font-size:10px;text-anchor:middle;dominant-baseline:central;pointer-events:none;user-select:none}
.edge-arrow{fill:var(--edge)}
.edge-arrow.selected{fill:var(--edge-sel)}
#sel-rect{fill:var(--sel-fill);stroke:var(--sel-stroke);stroke-width:1;stroke-dasharray:4 2;pointer-events:none}
.edge-ghost{stroke:var(--accent);stroke-width:1.5;stroke-dasharray:6 3;fill:none;pointer-events:none}
.node-port{fill:var(--accent);opacity:0;cursor:crosshair;transition:opacity .1s}
.node-group:hover .node-port{opacity:1}

/* ── INSPECTOR ────────────────────────────────────────────────── */
#inspector-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
#inspector-title{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
#inspector-body{flex:1;padding:10px 12px;overflow-y:auto}
.insp-section{margin-bottom:14px}
.insp-section-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-family:var(--font-mono)}
.insp-row{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.insp-row label{font-size:11px;color:var(--text2)}
.insp-row input,.insp-row select,.insp-row textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:5px 8px;font-size:12px;font-family:var(--font-ui);width:100%;outline:none;transition:border-color var(--transition)}
.insp-row input:focus,.insp-row select:focus,.insp-row textarea:focus{border-color:var(--accent)}
.insp-row textarea{resize:vertical;min-height:60px;font-family:var(--font-mono);font-size:11px}
.insp-row input[type=color]{padding:2px;height:28px;cursor:pointer}
.insp-btn{width:100%;padding:6px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12px;font-family:var(--font-ui);transition:all var(--transition);margin-top:3px}
.insp-btn:hover{background:var(--bg3);border-color:var(--border2)}
.insp-btn.danger{border-color:rgba(248,81,73,.4);color:var(--red)}
.insp-btn.danger:hover{background:rgba(248,81,73,.1)}
.insp-empty{color:var(--text3);font-size:12px;padding:20px 0;text-align:center;line-height:1.6}
.prop-list{display:flex;flex-direction:column;gap:4px}
.prop-item{display:flex;gap:4px;align-items:center}
.prop-item input{flex:1;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font-size:11px;font-family:var(--font-mono);outline:none}
.prop-item input:focus{border-color:var(--accent)}
.prop-rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;opacity:.6}
.prop-rm:hover{opacity:1}
#stats-bar{padding:6px 12px;border-top:1px solid var(--border);display:flex;gap:12px;font-size:10px;color:var(--text3);font-family:var(--font-mono)}
.stat-item span{color:var(--text2)}

/* ── OBJECT TABLE ─────────────────────────────────────────────── */
#obj-table-wrap{flex:1;overflow:auto}
#obj-search{width:100%;background:var(--bg2);border:none;border-bottom:1px solid var(--border);color:var(--text);padding:6px 12px;font-size:12px;font-family:var(--font-ui);outline:none}
#obj-search::placeholder{color:var(--text3)}
#obj-table{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--font-mono)}
#obj-table th{background:var(--bg2);color:var(--text3);padding:5px 8px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
#obj-table th:hover{color:var(--text)}
#obj-table th.sort-asc::after{content:" ↑"}
#obj-table th.sort-desc::after{content:" ↓"}
#obj-table td{padding:4px 8px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--text2);vertical-align:top;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#obj-table tr:hover td{background:var(--bg2);color:var(--text);cursor:pointer}
#obj-table tr.selected-row td{background:rgba(88,166,255,.08);color:var(--text)}
.type-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;text-transform:uppercase;letter-spacing:.05em}
.type-node{background:rgba(31,111,235,.3);color:#58a6ff}
.type-edge{background:rgba(163,113,247,.3);color:#a371f7}

/* ── GRAPHML DRAWER ───────────────────────────────────────────── */
#drawer-header{display:flex;align-items:center;gap:8px;padding:0 10px;height:28px;cursor:pointer;border-bottom:1px solid var(--border);user-select:none;flex-shrink:0}
#drawer-header-title{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:.05em}
#drawer-toggle{margin-left:auto;color:var(--text3);font-size:14px;transition:transform var(--transition)}
#drawer.collapsed #drawer-toggle{transform:rotate(180deg)}
#drawer-content{display:flex;flex:1;overflow:hidden;min-height:0}
#drawer.collapsed #drawer-content{display:none}
#graphml-output{flex:1;background:transparent;border:none;color:var(--green);font-family:var(--font-mono);font-size:11px;padding:8px 12px;resize:none;outline:none;overflow:auto;line-height:1.5}
#drawer-actions{display:flex;flex-direction:column;gap:4px;padding:8px;border-left:1px solid var(--border);flex-shrink:0;width:110px}
.drawer-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:5px 8px;font-size:11px;font-family:var(--font-ui);cursor:pointer;text-align:center;transition:all var(--transition)}
.drawer-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* ── MODALS ───────────────────────────────────────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--radius2);min-width:380px;max-width:560px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-mono);font-size:13px;color:var(--text);font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:16px 18px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:6px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12px;font-family:var(--font-ui);transition:all var(--transition)}
.modal-btn:hover{background:var(--bg3)}
.modal-btn.primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.modal-btn.primary:hover{background:var(--accent)}
.modal-body textarea{width:100%;height:220px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px;font-family:var(--font-mono);font-size:11px;resize:vertical;outline:none}
.modal-body textarea:focus{border-color:var(--accent)}
.modal-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5}

/* ── CONTEXT MENU ── --> */
#ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200;display:none;min-width:160px;padding:4px 0}
#ctx-menu.open{display:block}
.ctx-item{padding:6px 14px;cursor:pointer;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:8px;transition:background var(--transition)}
.ctx-item:hover{background:var(--bg3);color:var(--text)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(248,81,73,.1)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* ── NOTIFICATIONS ────────────────────────────────────────────── */
#notif{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:7px 16px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .2s;z-index:300;white-space:nowrap}
#notif.show{opacity:1}

/* ── NODE COLOR PALETTE ──────────────────────────────────────── */
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.color-swatch:hover,.color-swatch.active{border-color:#fff}

/* ── SCROLLBARS ───────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── ORPHAN TABLE ── */
#orphan-list{display:flex;flex-direction:column;gap:3px}
.orphan-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--bg2);border-radius:var(--radius);font-size:11px;font-family:var(--font-mono);color:var(--orange);border:1px solid rgba(210,153,34,.2)}
.orphan-item button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px}
.orphan-item button:hover{color:var(--accent)}
</style>
</head>
<body data-tool="select">

<div id="app">

  <div id="toolbar">
    <span id="toolbar-title">⬡ LPG</span>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="App.newGraph()" title="New graph">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75A.75.75 0 012.75 1h6.586a.75.75 0 01.53.22l3.914 3.914a.75.75 0 01.22.53V14.25a.75.75 0 01-.75.75H2.75a.75.75 0 01-.75-.75V1.75zm1.5.75v11h9V6.5H9.25A.75.75 0 018.5 5.75V2.5H3.5zm6.5.56l2.19 2.19H10V3.06z"/></svg>
      New
    </button>
    <button class="tb-btn" onclick="App.importJson()" title="Import Clipboard Text">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M7.47 10.78a.75.75 0 001.06 0l3.5-3.5a.75.75 0 00-1.06-1.06L8.75 8.44V1.75a.75.75 0 00-1.5 0v6.69L5.03 6.22a.75.75 0 00-1.06 1.06l3.5 3.5zM3.75 13a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z"/></svg>
      Import Text
    </button>
    <button class="tb-btn" onclick="$('json-file-input').click()" title="Select and Upload a JSON file">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/></svg>
      Upload File
    </button>
    <input type="file" id="json-file-input" accept=".json" onchange="App.handleJsonFile(this)" style="display:none;">
    <button class="tb-btn" onclick="App.exportJson()" title="Export Human Readable JSON">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M7.47 5.22a.75.75 0 011.06 0l3.5 3.5a.75.75 0 01-1.06 1.06L8.75 7.56v6.69a.75.75 0 01-1.5 0V7.56L5.03 9.78a.75.75 0 01-1.06-1.06l3.5-3.5zM3.75 1a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z"/></svg>
      JSON
    </button>
    <button class="tb-btn" onclick="App.exportPng()" title="Export current canvas to PNG image">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M.002 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-12a2 2 0 0 1-2-2V3zm1 9 2.5-3.5L5 10l3.05-4.435L14.002 12V3a1 1 0 0 0-1-1h-12a1 1 0 0 0-1 1v10zM11 5.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/></svg>
      Export PNG
    </button>
    <div class="tb-sep"></div>
    <span class="tb-label">Tool:</span>
    <button class="tb-btn" id="tool-select" onclick="App.setTool('select')" title="Select Box / Drag (S)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 1.5l9 6-5 1.5-1.5 5-2.5-12.5z"/></svg>
      Select
    </button>
    <button class="tb-btn" id="tool-pan" onclick="App.setTool('pan')" title="Pan view (P)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M7.25 2a.75.75 0 011.5 0v2.25H11a.75.75 0 010 1.5H8.75v1.5H11a.75.75 0 010 1.5H8.75V11a.75.75 0 01-1.5 0V8.75H5a.75.75 0 010-1.5h2.25v-1.5H5a.75.75 0 010-1.5h2.25V2z"/></svg>
      Pan
    </button>
    <button class="tb-btn" id="tool-node" onclick="App.setTool('node')" title="Add Node (N)">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="2"/></svg>
      Node
    </button>
    <button class="tb-btn" id="tool-edge" onclick="App.setTool('edge')" title="Add Edge Connection (E)">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="2" fill="currentColor"/><circle cx="13" cy="8" r="2" fill="currentColor"/><line x1="5" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.5"/></svg>
      Edge
    </button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="App.undo()" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1.22 7.22a.75.75 0 000 1.06l3.5 3.5a.75.75 0 001.06-1.06L3.56 8.5H10a3.5 3.5 0 110 7h-2a.75.75 0 000 1.5h2a5 5 0 100-10H3.56l2.22-2.22a.75.75 0 10-1.06-1.06l-3.5 3.5z"/></svg>
      Undo
    </button>
    <button class="tb-btn" onclick="App.redo()" title="Redo (Ctrl+Y)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14.78 7.22a.75.75 0 010 1.06l-3.5 3.5a.75.75 0 01-1.06-1.06l2.22-2.22H6a3.5 3.5 0 100 7h2a.75.75 0 010 1.5H6a5 5 0 110-10h6.44L10.22 4.78a.75.75 0 011.06-1.06l3.5 3.5z"/></svg>
      Redo
    </button>
    <button class="tb-btn danger" onclick="App.deleteSelected()" title="Delete item (Del)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zm4.5 0V3h2.25a.75.75 0 010 1.5H2.75a.75.75 0 010-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75zM4.496 6.675a.75.75 0 10-1.492.15l.66 6.6A1.75 1.75 0 005.405 15h5.19c.9 0 1.652-.681 1.741-1.576l.66-6.6a.75.75 0 00-1.492-.149l-.66 6.6a.25.25 0 01-.249.225h-5.19a.25.25 0 01-.249-.225l-.66-6.6z"/></svg>
      Delete
    </button>
    <div class="tb-spacer"></div>
    <button class="tb-btn" onclick="App.toggleTheme()" title="Switch layout colors">
      <span id="theme-icon">☀️</span> Light/Dark
    </button>
    <button class="tb-btn" onclick="App.autoLayout()" title="Auto force layout">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8.5 0A1.5 1.5 0 0111 1h3a1.5 1.5 0 011.5 1.5v3A1.5 1.5 0 0114 7h-3a1.5 1.5 0 01-1.5-1.5v-3zm-8.5 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8.5 0A1.5 1.5 0 0111 9h3a1.5 1.5 0 011.5 1.5v3A1.5 1.5 0 0114 15h-3a1.5 1.5 0 01-1.5-1.5v-3z"/></svg>
      Layout
    </button>
    <button class="tb-btn" onclick="App.fitView()" title="Fit view (F)">⊡ Fit</button>
    <span id="zoom-display">100%</span>
  </div>

  <div id="canvas-wrap">
    <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow-small" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <path d="M0,0 L6,2 L0,4 Z" class="edge-arrow"/>
        </marker>
        <marker id="arrow-small-sel" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
          <path d="M0,0 L6,2 L0,4 Z" style="fill:var(--edge-sel)"/>
        </marker>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" class="edge-arrow"/>
        </marker>
        <marker id="arrow-sel" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" style="fill:var(--edge-sel)"/>
        </marker>
        <marker id="arrow-large" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
          <path d="M0,0 L12,4.5 L0,9 Z" class="edge-arrow"/>
        </marker>
        <marker id="arrow-large-sel" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto">
          <path d="M0,0 L12,4.5 L0,9 Z" style="fill:var(--edge-sel)"/>
        </marker>
        <pattern id="grid-dots" width="24" height="24" patternUnits="userSpaceOnUse">
          <circle cx="12" cy="12" r="0.8" fill="var(--grid-dot-color)"/>
        </pattern>
      </defs>
      <rect id="grid-bg" width="100%" height="100%" fill="url(#grid-dots)" pointer-events="none"/>
      <g id="graph-root">
        <g id="edges-layer"></g>
        <g id="nodes-layer"></g>
        <rect id="sel-rect" x="0" y="0" width="0" height="0" display="none"/>
      </g>
    </svg>
  </div>

  <div id="inspector">
    <div id="inspector-header">
      <span id="inspector-title">Inspector</span>
    </div>
    <div id="inspector-body">
      <div class="insp-empty">Select a node or edge<br>to view properties</div>
    </div>
    <div id="stats-bar">
      <div class="stat-item">N: <span id="stat-nodes">0</span></div>
      <div class="stat-item">E: <span id="stat-edges">0</span></div>
      <div class="stat-item" id="stat-orphan-wrap">⚠ <span id="stat-orphans">0</span></div>
    </div>
  </div>

  <div id="drawer">
    <div id="drawer-header" onclick="App.toggleDrawer()">
      <span id="drawer-header-title">▸ GRAPHML / OBJECT TABLE</span>
      <span id="drawer-toggle">▲</span>
    </div>
    <div id="drawer-content">
      <textarea id="graphml-output" readonly spellcheck="false" placeholder="GraphML output appears here…"></textarea>
      <div id="drawer-actions">
        <button class="drawer-btn" onclick="App.copyGraphML()">Copy XML</button>
        <button class="drawer-btn" onclick="App.downloadGraphML()">↓ .graphml</button>
        <button class="drawer-btn" onclick="App.importGraphML()">↑ Import XML</button>
        <button class="drawer-btn" onclick="App.downloadJson()">↓ .json</button>
        <button class="drawer-btn" onclick="App.saveToStorage()">💾 Save</button>
      </div>
      <div id="obj-table-wrap" style="border-left:1px solid var(--border);flex:0 0 340px">
        <input id="obj-search" type="search" placeholder="Search nodes / edges…" oninput="App.filterTable(this.value)">
        <table id="obj-table">
          <thead>
            <tr>
              <th onclick="App.sortTable('type')">Type</th>
              <th onclick="App.sortTable('id')">ID</th>
              <th onclick="App.sortTable('label')">Label</th>
              <th onclick="App.sortTable('extra')">Extra</th>
            </tr>
          </thead>
          <tbody id="obj-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Dialog</span>
      <button class="modal-close" onclick="App.closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="ctx-menu"></div>

<div id="notif"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const State = {
  nodes: [],          
  edges: [],          
  selected: new Set(),
  tool: 'select',
  view: {x:0, y:0, k:1},
  dragging: null,     
  edgeGhost: null,    
  selRect: null,      
  history: [],        
  future: [],         
  tableSort: {col:'type', asc:true},
  drawerOpen: true,
  idCounter: 1,
  graphId: 'graph1',
  graphMeta: {edgedefault:'undirected'},
};

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const svgNS = 'http://www.w3.org/2000/svg';

function uid(prefix='n'){
  return prefix + (State.idCounter++);
}
function serialize(formatted = false){
  const obj = {
    nodes: State.nodes.map(n=>({...n, props:{...n.props}})),
    edges: State.edges.map(e=>({...e})),
    idCounter: State.idCounter,
    graphId: State.graphId,
    graphMeta: {...State.graphMeta},
    view: {...State.view}
  };
  return formatted ? JSON.stringify(obj, null, 2) : JSON.stringify(obj);
}
function deserialize(str){
  const d = JSON.parse(str);
  State.nodes = d.nodes || [];
  State.edges = d.edges || [];
  State.idCounter = d.idCounter || 1;
  State.graphId = d.graphId || 'graph1';
  State.graphMeta = d.graphMeta || {edgedefault:'undirected'};
  State.view = d.view || {x:0,y:0,k:1};
  State.selected.clear();
}
function snapshot(){
  const s = serialize();
  State.history.push(s);
  if(State.history.length > 60) State.history.shift();
  State.future = [];
}
function notify(msg, ms=1800){
  const el = $('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════════════
//  SVG RENDER
// ═══════════════════════════════════════════════════════════════
function svgEl(tag, attrs={}){
  const el = document.createElementNS(svgNS, tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

const NODE_COLORS = [
  '#1f6feb','#1a7f37','#9e6a03','#8250df','#cf222e','#0969da',
  '#2da44e','#d4a72c','#6e40c9','#e34c26','#0550ae','#33a06f'
];

function nodeColor(n){ return n.color || '#1f6feb'; }
function nodeRadius(n){ return n.r || 26; }

function renderAll(){
  renderEdges();
  renderNodes();
  renderGraphML();
  renderTable();
  updateStats();
  applyTransform();
}

function renderNodes(){
  const layer = $('nodes-layer');
  const existing = new Map();
  for(const g of layer.querySelectorAll('.node-group')) existing.set(g.dataset.id, g);

  const alive = new Set(State.nodes.map(n=>n.id));
  for(const [id,g] of existing) if(!alive.has(id)) g.remove();

  for(const n of State.nodes){
    let g = existing.get(n.id);
    if(!g){
      g = svgEl('g',{class:'node-group','data-id':n.id});
      const c = svgEl('circle',{class:'node-circle',cx:0,cy:0});
      const txt = svgEl('text',{class:'node-label',x:0,y:0});
      const port = svgEl('circle',{class:'node-port',cx:0,cy:0,r:8});
      g.append(c, txt, port);
      attachNodeEvents(g, n.id);
      layer.appendChild(g);
    }
    const r = nodeRadius(n);
    g.querySelector('.node-circle').setAttribute('r', r);
    g.querySelector('.node-circle').setAttribute('fill', nodeColor(n));
    g.querySelector('.node-circle').setAttribute('stroke', lightenColor(nodeColor(n), 40));
    const lbl = n.label || n.id;
    g.querySelector('.node-label').textContent = truncLabel(lbl, r);
    g.querySelector('.node-port').setAttribute('r', r+4);
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.dataset.id = n.id;
    g.classList.toggle('selected', State.selected.has(n.id));

    const connected = State.edges.some(e=>e.source===n.id||e.target===n.id);
    g.classList.toggle('orphan', !connected);
  }
}

function truncLabel(lbl, r){
  const maxChars = Math.max(4, Math.floor(r/4.5));
  return lbl.length > maxChars ? lbl.slice(0, maxChars)+'…' : lbl;
}

function lightenColor(hex, pct){
  if(!hex||hex[0]!=='#') return hex;
  const num = parseInt(hex.slice(1),16);
  const r = Math.min(255,(num>>16)+pct), g=Math.min(255,((num>>8)&0xff)+pct), b=Math.min(255,(num&0xff)+pct);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function renderEdges(){
  const layer = $('edges-layer');
  const existing = new Map();
  for(const g of layer.querySelectorAll('.edge-group')) existing.set(g.dataset.id, g);

  const alive = new Set(State.edges.map(e=>e.id));
  for(const [id,g] of existing) if(!alive.has(id)) g.remove();

  for(const e of State.edges){
    const src = State.nodes.find(n=>n.id===e.source);
    const tgt = State.nodes.find(n=>n.id===e.target);
    if(!src||!tgt) continue;
    const {x1,y1,x2,y2} = edgeEndpoints(src,tgt);

    let g = existing.get(e.id);
    if(!g){
      g = svgEl('g',{class:'edge-group','data-id':e.id});
      const line = svgEl('path',{class:'edge-line','data-id':e.id});
      const hitLine = svgEl('path',{stroke:'transparent','stroke-width':'12',fill:'none',cursor:'pointer','data-id':e.id});
      const lbl = svgEl('text',{class:'edge-label-text'});
      g.append(line, hitLine, lbl);
      attachEdgeEvents(g, e.id);
      layer.appendChild(g);
    }

    let d = '';
    const style = e.style || 'straight';
    if(style === 'straight') {
      d = `M${x1},${y1} L${x2},${y2}`;
    } else if (style === 'curved') {
      const mx = (x1+x2)/2, my = (y1+y2)/2;
      const dx = x2 - x1, dy = y2 - y1;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const nx = -dy / dist * 30;
      const ny = dx / dist * 30;
      d = `M${x1},${y1} Q${mx + nx},${my + ny} ${x2},${y2}`;
    } else if (style === 'orthogonal') {
      const mx = (x1+x2)/2;
      d = `M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2},${y2}`;
    }

    const aSize = e.arrowSize || 'medium';
    let markerId = 'arrow';
    if(aSize === 'small') markerId = 'arrow-small';
    if(aSize === 'large') markerId = 'arrow-large';
    if(State.selected.has(e.id)) markerId += '-sel';
    
    const marker = e.directed!==false ? `url(#${markerId})` : '';
    const lineEl = g.querySelector('.edge-line');
    lineEl.setAttribute('d', d);
    lineEl.setAttribute('marker-end', marker);
    lineEl.classList.toggle('selected', State.selected.has(e.id));
    
    let edgeColor = e.color || 'var(--edge)';
    if(edgeColor === 'inherit') edgeColor = nodeColor(src);
    lineEl.setAttribute('stroke', edgeColor);

    if(e.dash === 'dashed') lineEl.setAttribute('stroke-dasharray', '6 4');
    else if(e.dash === 'dotted') lineEl.setAttribute('stroke-dasharray', '2 3');
    else lineEl.removeAttribute('stroke-dasharray');

    g.querySelectorAll('path')[1].setAttribute('d',d);

    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const lel = g.querySelector('text');
    lel.setAttribute('x', mx);
    lel.setAttribute('y', my - 8);
    lel.textContent = e.label || '';
  }
}

function edgeEndpoints(src, tgt){
  const dx = tgt.x - src.x, dy = tgt.y - src.y;
  const d = Math.sqrt(dx*dx + dy*dy) || 1;
  const r1 = nodeRadius(src), r2 = nodeRadius(tgt);
  return {
    x1: src.x + (dx/d)*r1,
    y1: src.y + (dy/d)*r1,
    x2: tgt.x - (dx/d)*(r2 + 4),
    y2: tgt.y - (dy/d)*(r2 + 4)
  };
}

function applyTransform(){
  $('graph-root').setAttribute('transform',`translate(${State.view.x},${State.view.y}) scale(${State.view.k})`);
  $('zoom-display').textContent = Math.round(State.view.k * 100) + '%';
}

// ═══════════════════════════════════════════════════════════════
//  CANVAS INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function svgPoint(e){
  const svg = $('svg-canvas');
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const root = $('graph-root');
  return pt.matrixTransform(root.getCTM().inverse());
}

let _panStart = null;

function attachNodeEvents(g, id){
  g.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    if(State.tool==='edge'){
      const n = State.nodes.find(nn=>nn.id===id);
      State.edgeGhost = {sourceId:id, x1:n.x, y1:n.y, x2:n.x, y2:n.y};
      return;
    }
    if(State.tool==='select'){
      if(!State.selected.has(id)){
        if(!e.shiftKey) State.selected.clear();
        State.selected.add(id);
      } else if(e.shiftKey){
        State.selected.delete(id);
      }
      const pt = svgPoint(e);
      const startPtrs = {};
      const ids = [...State.selected].filter(sid=>State.nodes.some(n=>n.id===sid));
      for(const sid of ids){
        const n = State.nodes.find(nn=>nn.id===sid);
        startPtrs[sid] = {ox: pt.x - n.x, oy: pt.y - n.y};
      }
      State.dragging = { ids, startPtrs };
      renderAll();
      renderInspector();
    }
  });
  g.addEventListener('dblclick', e=>{
    e.stopPropagation();
    startInlineRename(id);
  });
}

function attachEdgeEvents(g, id){
  g.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    if(State.tool==='select'){
      if(!e.shiftKey) State.selected.clear();
      State.selected.add(id);
      renderAll();
      renderInspector();
    }
  });
  g.addEventListener('contextmenu', e=>{
    e.preventDefault(); e.stopPropagation();
    State.selected.clear();
    State.selected.add(id);
    renderAll();
    renderInspector();
    showCtxMenu(e.clientX, e.clientY, [
      {label:'🔄 Toggle Direction', action:()=>{
        snapshot();
        const ed = State.edges.find(e=>e.id===id);
        if(ed) ed.directed = !ed.directed;
        renderAll();
      }},
      {sep:true},
      {label:'🗑 Delete Edge', danger:true, action:()=>App.deleteSelected()},
    ]);
  });
}

$('svg-canvas').addEventListener('pointerdown', e=>{
  if(e.button !== 0) return;
  const targetGroup = e.target.closest('.node-group, .edge-group');
  if(targetGroup) return;

  if(e.shiftKey || State.tool==='pan'){
    _panStart = {px:e.clientX, py:e.clientY, vx:State.view.x, vy:State.view.y};
    document.body.classList.add('panning');
    $('svg-canvas').setPointerCapture(e.pointerId);
    return;
  }
  if(State.tool==='select'){
    const pt = svgPoint(e);
    State.selRect = {x0:pt.x, y0:pt.y, x1:pt.x, y1:pt.y};
    if(!e.shiftKey) State.selected.clear();
    $('svg-canvas').setPointerCapture(e.pointerId);
    renderAll();
    renderInspector();
  }
  if(State.tool==='node'){
    snapshot();
    const pt = svgPoint(e);
    const n = {id:uid('n'), label:'Node', x:pt.x, y:pt.y, color:'#1f6feb', r:26, props:{}};
    State.nodes.push(n);
    State.selected.clear();
    State.selected.add(n.id);
    renderAll();
    renderInspector();
  }
});

$('svg-canvas').addEventListener('pointermove', e=>{
  if(_panStart){
    State.view.x = _panStart.vx + (e.clientX - _panStart.px);
    State.view.y = _panStart.vy + (e.clientY - _panStart.py);
    applyTransform();
    return;
  }
  if(State.edgeGhost){
    const pt = svgPoint(e);
    State.edgeGhost.x2 = pt.x;
    State.edgeGhost.y2 = pt.y;
    renderEdgeGhost();
    return;
  }
  if(State.dragging){
    const pt = svgPoint(e);
    for(const sid of State.dragging.ids){
      const nn = State.nodes.find(nn=>nn.id===sid);
      if(nn){
        nn.x = pt.x - State.dragging.startPtrs[sid].ox;
        nn.y = pt.y - State.dragging.startPtrs[sid].oy;
      }
    }
    renderEdges();
    renderNodes();
    return;
  }
  if(State.selRect){
    const pt = svgPoint(e);
    State.selRect.x1 = pt.x;
    State.selRect.y1 = pt.y;
    updateSelRect();
    return;
  }
});

$('svg-canvas').addEventListener('pointerup', e=>{
  if(_panStart){
    _panStart=null;
    document.body.classList.remove('panning');
    return;
  }
  if(State.edgeGhost){
    const pt = svgPoint(e);
    const tgt = State.nodes.find(n=>{
      const dx=n.x-pt.x, dy=n.y-pt.y;
      return Math.sqrt(dx*dx+dy*dy) <= nodeRadius(n)+10;
    });
    if(tgt && tgt.id !== State.edgeGhost.sourceId){
      snapshot();
      State.edges.push({id:uid('e'), source:State.edgeGhost.sourceId, target:tgt.id, label:'', directed:true, style:'straight', dash:'solid', arrowSize:'medium'});
      renderAll();
    }
    removeEdgeGhost();
    State.edgeGhost = null;
    return;
  }
  if(State.dragging){
    snapshot();
    State.dragging=null;
    return;
  }
  if(State.selRect){
    finalizeSelRect();
    State.selRect=null;
    const sr = $('sel-rect');
    sr.setAttribute('display','none');
    renderAll();
    renderInspector();
    return;
  }
});

$('svg-canvas').addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = $('svg-canvas').getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.1 : 0.9;
  const newK = Math.max(0.1, Math.min(5, State.view.k * delta));
  State.view.x = mx - (mx - State.view.x) * (newK / State.view.k);
  State.view.y = my - (my - State.view.y) * (newK / State.view.k);
  State.view.k = newK;
  applyTransform();
});

function updateSelRect(){
  if(!State.selRect) return;
  const x = Math.min(State.selRect.x0, State.selRect.x1);
  const y = Math.min(State.selRect.y0, State.selRect.y1);
  const w = Math.abs(State.selRect.x1 - State.selRect.x0);
  const h = Math.abs(State.selRect.y1 - State.selRect.y0);
  const sr = $('sel-rect');
  sr.setAttribute('x',x); sr.setAttribute('y',y);
  sr.setAttribute('width',w); sr.setAttribute('height',h);
  sr.setAttribute('display','block');

  const xMin = x, xMax = x+w, yMin = y, yMax = y+h;
  for(const n of State.nodes){
    const inside = n.x >= xMin && n.x <= xMax && n.y >= yMin && n.y <= yMax;
    const g = $('nodes-layer').querySelector(`[data-id="${n.id}"]`);
    if(g) g.classList.toggle('selected', inside || State.selected.has(n.id));
  }
}

function finalizeSelRect(){
  if(!State.selRect) return;
  const xMin = Math.min(State.selRect.x0, State.selRect.x1);
  const xMax = Math.max(State.selRect.x0, State.selRect.x1);
  const yMin = Math.min(State.selRect.y0, State.selRect.y1);
  const yMax = Math.max(State.selRect.y0, State.selRect.y1);
  for(const n of State.nodes){
    if(n.x >= xMin && n.x <= xMax && n.y >= yMin && n.y <= yMax){
      State.selected.add(n.id);
    }
  }
}

function renderEdgeGhost(){
  let ghost = $('svg-canvas').querySelector('.edge-ghost');
  if(!ghost){
    ghost = svgEl('line',{class:'edge-ghost'});
    $('svg-canvas').appendChild(ghost);
  }
  const g = State.edgeGhost;
  ghost.setAttribute('x1',g.x1); ghost.setAttribute('y1',g.y1);
  ghost.setAttribute('x2',g.x2); ghost.setAttribute('y2',g.y2);
}
function removeEdgeGhost(){
  const ghost = $('svg-canvas').querySelector('.edge-ghost');
  if(ghost) ghost.remove();
}

// ═══════════════════════════════════════════════════════════════
//  INLINE RENAME
// ═══════════════════════════════════════════════════════════════
function startInlineRename(id){
  const n = State.nodes.find(n=>n.id===id);
  if(!n) return;
  const g = $('nodes-layer').querySelector(`[data-id="${id}"]`);
  const txt = g.querySelector('.node-label');
  const fo = svgEl('foreignObject',{x:-50, y:-14, width:100, height:24});
  const inp = document.createElement('input');
  inp.value = n.label;
  inp.style.cssText='width:100%;background:#161b22;border:1px solid var(--accent);color:var(--text);border-radius:4px;padding:2px 4px;font-size:11px;text-align:center;outline:none';
  fo.appendChild(inp);
  g.appendChild(fo);
  inp.focus(); inp.select();
  const done = ()=>{
    snapshot();
    n.label = inp.value || n.id;
    fo.remove();
    renderAll();
    renderInspector();
  };
  inp.addEventListener('blur', done);
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter') done();
    if(e.key==='Escape') fo.remove();
  });
}

function buildOrphanList(){

      <button onclick="App.selectNode('${n.id}')" title="Select">→</button>

}

function updateStats(){

function escHtml(s){

}

let _tableFilter = '';
function renderTable(){
  const tbody = $('obj-tbody');
  const s = State.tableSort;
  let rows = [
    ...State.nodes.map(n=>({type:'node', id:n.id, label:n.label||'', extra:Object.keys(n.props||{}).join(', ')})),
    ...State.edges.map(e=>({type:'edge', id:e.id, label:e.label||'', extra:`${e.source}→${e.target}`}))
  ];
  if(_tableFilter){
    const f = _tableFilter.toLowerCase();
    rows = rows.filter(r=>r.id.toLowerCase().includes(f)||r.label.toLowerCase().includes(f)||r.extra.toLowerCase().includes(f));
  }
  rows.sort((a,b)=>{
    const av=a[s.col]||'', bv=b[s.col]||'';
    return s.asc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  tbody.innerHTML = rows.map(r=>`
    <tr class="${State.selected.has(r.id)?'selected-row':''}" onclick="App.selectFromTable('${r.id}')">
      <td><span class="type-badge type-${r.type}">${r.type}</span></td>
      <td title="${escHtml(r.id)}">${escHtml(r.id)}</td>
      <td title="${escHtml(r.label)}">${escHtml(r.label)}</td>
      <td title="${escHtml(r.extra)}">${escHtml(r.extra)}</td>
    </tr>`).join('');

  for(const th of document.querySelectorAll('#obj-table th')){
    th.classList.remove('sort-asc','sort-desc');
    const col = th.getAttribute('onclick').match(/sortTable\('(\w+)'\)/)?.[1];
    if(col===s.col) th.classList.add(s.asc?'sort-asc':'sort-desc');
  }
}

//  GRAPHML GENERATION
// ═══════════════════════════════════════════════════════════════
function renderGraphML(){
  let xml = `<?xml version="1.0" encoding="UTF-8"?>\n<graphml xmlns="http://graphml.graphdrawing.org/xmlns">\n`;
  xml += `  <graph id="${escHtml(State.graphId)}" edgedefault="${escHtml(State.graphMeta.edgedefault)}">\n`;
  for(const n of State.nodes){
    xml += `    <node id="${escHtml(n.id)}">\n`;
    xml += `      <data key="label">${escHtml(n.label)}</data>\n`;
    xml += `      <data key="x">${n.x}</data>\n`;
    xml += `      <data key="y">${n.y}</data>\n`;
    xml += `      <data key="color">${nodeColor(n)}</data>\n`;
    xml += `      <data key="r">${nodeRadius(n)}</data>\n`;
    if(n.props){
      for(const [k,v] of Object.entries(n.props)){
        xml += `      <data key="${escHtml(k)}">${escHtml(v)}</data>\n`;
      }
    }
    xml += `    </node>\n`;
  }
  for(const e of State.edges){
    const dir = e.directed!==false?'true':'false';
    xml += `    <edge id="${escHtml(e.id)}" source="${escHtml(e.source)}" target="${escHtml(e.target)}" directed="${dir}">\n`;
    if(e.label) xml += `      <data key="label">${escHtml(e.label)}</data>\n`;
    if(e.style) xml += `      <data key="style">${escHtml(e.style)}</data>\n`;
    if(e.dash) xml += `      <data key="dash">${escHtml(e.dash)}</data>\n`;
    if(e.color) xml += `      <data key="color">${escHtml(e.color)}</data>\n`;
    xml += `    </edge>\n`;
  }
  xml += `  </graph>\n</graphml>`;
  $('graphml-output').value = xml;
}

// ═══════════════════════════════════════════════════════════════
//  GRAPHML XML PARSER ENGINE
// ═══════════════════════════════════════════════════════════════
function parseGraphML(xmlStr){
  let doc;
  try{ doc = (new DOMParser()).parseFromString(xmlStr,'application/xml'); } catch(e){ return null; }
  const err = doc.querySelector('parsererror'); if(err) return null;
  const graph = doc.querySelector('graph'); if(!graph) return null;
  const graphId = graph.getAttribute('id') || 'graph1';
  const edgedefault = graph.getAttribute('edgedefault') || 'undirected';
  const nodes = [], edges = [];
  let maxId = 0;
  const getNum = s => { const m=s.match(/\d+$/); return m?parseInt(m[0]):0; };

  for(const el of graph.querySelectorAll('node')){
    const id = el.getAttribute('id');
    maxId = Math.max(maxId, getNum(id));
    const n = {id, label:id, x:0, y:0, color:'#1f6feb', r:26, props:{}};
    for(const d of el.querySelectorAll('data')){
      const k = d.getAttribute('key'), val = d.textContent.trim();
      if(k==='label') n.label = val;
      else if(k==='x') n.x = parseFloat(val)||0;
      else if(k==='y') n.y = parseFloat(val)||0;
      else if(k==='color') n.color = val;
      else if(k==='r') n.r = parseInt(val)||26;
      else n.props[k] = val;
    }
    nodes.push(n);
  }
  for(const el of graph.querySelectorAll('edge')){
    const id = el.getAttribute('id') || ('e'+uid('e'));
    maxId = Math.max(maxId, getNum(id));
    const e = {id, source:el.getAttribute('source'), target:el.getAttribute('target'), label:'', directed:edgedefault==='directed', style:'straight', dash:'solid', arrowSize:'medium'};
    const dDir = el.getAttribute('directed');
    if(dDir) e.directed = dDir==='true';
    for(const d of el.querySelectorAll('data')){
      const k = d.getAttribute('key'), val = d.textContent.trim();
      if(k==='label') e.label = val;
      else if(k==='style') e.style = val;
      else if(k==='dash') e.dash = val;
      else if(k==='color') e.color = val;
    }
    edges.push(e);
  }
  return { nodes, edges, graphId, graphMeta:{edgedefault}, idCounter:maxId+1 };
}

function importFromJSON(text){
  let d; try{ d = JSON.parse(text); } catch(e){ return false; }
  if(d && Array.isArray(d.nodes) && Array.isArray(d.edges)){
    snapshot();
    State.nodes = d.nodes.map(n=>({id:n.id, label:n.label||n.id, x:n.x||0, y:n.y||0, color:n.color||'#1f6feb', r:n.r||26, props:n.props||{}}));
    State.edges = d.edges.map(e=>({id:e.id||uid('e'), source:e.source, target:e.target, label:e.label||'', directed:e.directed!==false, style:e.style||'straight', dash:e.dash||'solid', arrowSize:e.arrowSize||'medium', color:e.color}));
    State.graphId = d.graphId || 'graph1';
    State.graphMeta = d.graphMeta || {edgedefault:'undirected'};
    State.idCounter = d.idCounter || (Math.max(0,...State.nodes.map(n=>parseInt(n.id.replace(/\D/g,''))||0))+1);
    State.selected.clear();
    autoLayoutIfNoPositions();
    renderAll();
    renderInspector();
    return true;
  }
  return false;
}

function autoLayoutIfNoPositions(){
  if(State.nodes.every(n=>n.x===0&&n.y===0)) doAutoLayout();
}

// ═══════════════════════════════════════════════════════════════
//  FORCE DIRECTED AUTO LAYOUT
// ═══════════════════════════════════════════════════════════════
function doAutoLayout(){
  if(State.nodes.length===0) return;
  const W=800, H=600;
  for(const n of State.nodes){
    if(n.x===0&&n.y===0){ n.x = 80 + Math.random()*(W-160); n.y = 80 + Math.random()*(H-160); }
  }
  const K = 80, REPULSE = 6000, ITERS = 120;
  for(let iter=0; iter<ITERS; iter++){
    const forces = {};
    for(const n of State.nodes) forces[n.id]={fx:0,fy:0};
    for(let i=0;i<State.nodes.length;i++){
      for(let j=i+1;j<State.nodes.length;j++){
        const a=State.nodes[i], b=State.nodes[j];
        let dx=b.x-a.x, dy=b.y-a.y; const d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=REPULSE/(d*d); forces[a.id].fx-=f*dx/d; forces[a.id].fy-=f*dy/d; forces[b.id].fx+=f*dx/d; forces[b.id].fy+=f*dy/d;
      }
    }
    for(const e of State.edges){
      const a=State.nodes.find(n=>n.id===e.source), b=State.nodes.find(n=>n.id===e.target);
      if(!a||!b) continue;
      let dx=b.x-a.x, dy=b.y-a.y; const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=0.06*(d-K); forces[a.id].fx+=f*dx/d; forces[a.id].fy+=f*dy/d; forces[b.id].fx-=f*dx/d; forces[b.id].fy-=f*dy/d;
    }
    for(const n of State.nodes){
      n.x += Math.max(-30, Math.min(30, forces[n.id].fx));
      n.y += Math.max(-30, Math.min(30, forces[n.id].fy));
    }
  }
}

window.App = {
  setTool(t){
    State.tool = t; document.body.setAttribute('data-tool',t);
    for(const btn of document.querySelectorAll('#toolbar .tb-btn')) if(btn.id) btn.classList.remove('active');
    const target = $('tool-'+t); if(target) target.classList.add('active');
    if(t==='select'){ State.selected.clear(); renderAll(); renderInspector(); }
  },
  toggleTheme(){
    const isLight = document.body.classList.toggle('light-mode');
    $('theme-icon').textContent = isLight ? '🌙' : '☀️';
    renderAll();
    notify(isLight ? "Light theme enabled" : "Dark theme enabled");
  },
  exportPng() {
    const svg = $('svg-canvas').cloneNode(true);
    const sRect = svg.querySelector('#sel-rect'); if(sRect) sRect.remove();
    
    let cssText = '';
    try {
      for (const rule of document.styleSheets[0].cssRules) {
        if (rule.selectorText && (rule.selectorText.includes('node') || rule.selectorText.includes('edge') || rule.selectorText.includes('svg'))) {
          cssText += rule.cssText + '\n';
        }
      }
    } catch(e){}

    const isLight = document.body.classList.contains('light-mode');
    const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
    styleEl.textContent = `
      ${cssText}
      :root {
        --bg0: ${isLight ? '#f6f8fa' : '#0d1117'};
        --text: ${isLight ? '#1f2937' : '#e6edf3'};
        --text2: ${isLight ? '#4b5563' : '#8b949e'};
        --text3: ${isLight ? '#9ca3af' : '#6e7681'};
        --accent: ${isLight ? '#2563eb' : '#58a6ff'};
        --edge: ${isLight ? '#3b82f6' : '#58a6ff'};
        --edge-sel: #f0883e;
        --node-default: ${isLight ? '#2563eb' : '#1f6feb'};
        --font-ui: 'Segoe UI', sans-serif;
      }
      #grid-bg { fill: ${isLight ? '#f6f8fa' : '#0d1117'}; }
    `;
    svg.insertBefore(styleEl, svg.firstChild);

    const bbox = $('graph-root').getBBox();
    const padding = 50;
    const width = Math.max(800, bbox.width + padding * 2);
    const height = Math.max(600, bbox.height + padding * 2);
    
    svg.setAttribute('width', width);
    svg.setAttribute('height', height);
    svg.setAttribute('viewBox', `${bbox.x - padding} ${bbox.y - padding} ${width} ${height}`);

    const svgString = (new XMLSerializer()).serializeToString(svg);
    const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width * 2; canvas.height = height * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      ctx.drawImage(img, 0, 0, width, height);
      
      const a = document.createElement('a');
      a.download = (State.graphId || 'graph') + '.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      URL.revokeObjectURL(url);
      notify('PNG exported successfully');
    };
    img.src = url;
  },
  handleJsonFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      if (importFromJSON(e.target.result)) {
        notify('JSON File uploaded successfully');
      } else {
        notify('Invalid JSON graph format file', 3000);
      }
      input.value = '';
    };
    reader.readAsText(file);
  },
  newGraph(){
    if(confirm('Clear graph canvas?')){
      snapshot(); State.nodes=[]; State.edges=[]; State.selected.clear(); State.idCounter=1; renderAll(); renderInspector();
    }
  },
  undo(){
    if(!State.history.length) return;
    State.future.push(serialize());
    deserialize(State.history.pop());
    renderAll(); renderInspector(); notify('Undo');
  },
  redo(){
    if(!State.future.length) return;
    State.history.push(serialize());
    deserialize(State.future.pop());
    renderAll(); renderInspector(); notify('Redo');
  },
  deleteSelected(){
    if(!State.selected.size) return;
    snapshot(); const ids = new Set(State.selected);
    State.nodes = State.nodes.filter(n=>!ids.has(n.id));
    State.edges = State.edges.filter(e=>!ids.has(e.id) && !ids.has(e.source) && !ids.has(e.target));
    State.selected.clear(); renderAll(); renderInspector(); notify('Deleted');
  },
  setProp(type, id, key, val){
    snapshot();
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id); if(n){ n[key]=val; renderAll(); renderInspector(); }
    } else {
      const e=State.edges.find(e=>e.id===id); if(e){ e[key]=val; renderAll(); renderInspector(); }
    }
  },
  setLiveProp(type, id, key, val){
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id); if(n) n[key]=val;
    } else {
      const e=State.edges.find(e=>e.id===id); if(e) e[key]=val;
    }
    renderAll();
  },
  setLivePropKV(type, id, key, val){
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id); if(n&&n.props) n.props[key]=val;
    }
    renderGraphML(); renderTable();
  },
  renamePropKey(type, id, oldKey, newKey){
    if(oldKey===newKey) return; snapshot();
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id);
      if(n&&n.props){ n.props[newKey]=n.props[oldKey]; delete n.props[oldKey]; renderGraphML(); renderTable(); }
    }
  },
  addProp(type, id){
    snapshot();
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id);
      if(n){ if(!n.props)n.props={}; n.props['key'+Date.now().toString(36)]=''; renderInspector(); }
    }
  },
  removeProp(type, id, key){
    snapshot();
    if(type==='node'){
      const n=State.nodes.find(n=>n.id===id); if(n&&n.props){ delete n.props[key]; renderInspector(); renderGraphML(); }
    }
  },
  renameNodeId(oldId, newId){
    if(!newId||newId===oldId) return;
    if(State.nodes.find(n=>n.id===newId)){ notify('ID already exists'); return; }
    snapshot();
    const n=State.nodes.find(n=>n.id===oldId); if(n) n.id=newId;
    for(const e of State.edges){
      if(e.source===oldId) e.source=newId; if(e.target===oldId) e.target=newId;
    }
    State.selected.delete(oldId); State.selected.add(newId);
    renderAll(); renderInspector(); notify('ID Renamed');
  },
  setMultiColor(c){
    snapshot();
    for(const id of State.selected){
      const n = State.nodes.find(nn=>nn.id===id); if(n) n.color = c;
      const e = State.edges.find(ee=>ee.id===id); if(e) e.color = c;
    }
    renderAll(); renderInspector();
  },
  autoLayout(){ snapshot(); doAutoLayout(); renderAll(); notify('Force layout applied'); },
  fitView(){
    if(State.nodes.length===0){ State.view={x:0,y:0,k:1}; applyTransform(); return; }
    const rect = $('svg-canvas').getBoundingClientRect();
    const W = rect.width||800, H = rect.height||600;
    let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
    for(const n of State.nodes){
      const r = nodeRadius(n);
      if(n.x-r < minX) minX=n.x-r; if(n.x+r > maxX) maxX=n.x+r;
      if(n.y-r < minY) minY=n.y-r; if(n.y+r > maxY) maxY=n.y+r;
    }
    const gW = maxX-minX, gH = maxY-minY, padding=60;
    const k = Math.max(0.1, Math.min(2, Math.min((W-padding*2)/gW, (H-padding*2)/gH)));
    State.view.k = k;
    State.view.x = W/2 - ((minX+maxX)/2)*k; State.view.y = H/2 - ((minY+maxY)/2)*k;
    applyTransform();
  },
  toggleDrawer(){
    const dr = $('drawer'); dr.classList.toggle('collapsed');
    State.drawerOpen = !dr.classList.contains('collapsed');
    $('drawer-toggle').textContent = State.drawerOpen ? '▼' : '▲';
  },
  copyGraphML(){
    $('graphml-output').select(); document.execCommand('copy'); notify('XML copied to clipboard');
  },
  downloadGraphML(){
    downloadFile($('graphml-output').value, (State.graphId||'graph')+'.graphml', 'application/xml');
  },
  downloadJson(){
    downloadFile(serialize(true), (State.graphId||'graph')+'.json', 'application/json');
  },
  importGraphML(){
    const input = document.createElement('input'); input.type='file'; input.accept='.graphml,.xml';
    input.onchange = e=>{
      const file = e.target.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = res=>{
        const result = parseGraphML(res.target.result);
        if(result){
          snapshot(); State.nodes=result.nodes; State.edges=result.edges; State.graphId=result.graphId; State.graphMeta=result.graphMeta; State.idCounter=result.idCounter||1; State.selected.clear(); doAutoLayout(); renderAll(); renderInspector(); App.fitView(); notify('GraphML Imported');
        } else { notify('Invalid XML/GraphML schema', 3000); }
      };
      reader.readAsText(file);
    };
    input.click();
  },
  saveToStorage(){ localStorage.setItem('lpg_graph_state', serialize()); notify('Saved to local browser cache'); },
  selectNode(id){ State.selected.clear(); State.selected.add(id); renderAll(); renderInspector(); },
  selectFromTable(id){ if(!State.selected.has(id)){ State.selected.clear(); State.selected.add(id); renderAll(); renderInspector(); } },
  sortTable(col){
    if(State.tableSort.col === col) State.tableSort.asc = !State.tableSort.asc;
    else { State.tableSort.col = col; State.tableSort.asc = true; }
    renderTable();
  },
  filterTable(val){ _tableFilter = val; renderTable(); },
  importJson(){
    openModal('Import JSON Layout String', `<textarea id="import-json" placeholder="Paste your text layout structure here…"></textarea>`, [
      {label:'Cancel'},
      {label:'Load Layout', primary:true, action:()=>{
        const text=$('import-json').value.trim(); if(!text){ notify('Nothing to import'); return; }
        if(text.startsWith('<?xml')||text.startsWith('<graphml')){
          const res = parseGraphML(text);
          if(res){ snapshot(); State.nodes=res.nodes; State.edges=res.edges; State.graphId=res.graphId; State.graphMeta=res.graphMeta; State.idCounter=res.idCounter||1; State.selected.clear(); doAutoLayout(); renderAll(); renderInspector(); App.fitView(); notify('GraphML string loaded'); return; }
        }
        if(!importFromJSON(text)) notify('Unrecognized format structure', 3000);
      }}
    ]);
  },
  exportJson(){
    openModal('Export Graph JSON Layout', `<textarea readonly>${escHtml(serialize(true))}</textarea><p class="modal-note">Copy layout parameters data explicitly below.</p>`, [{label:'Close'},{label:'Download', primary:true, action:()=>App.downloadJson()}]);
  },
  closeModal(){ $('modal-overlay').classList.remove('open'); }
};

// ═══════════════════════════════════════════════════════════════
//  DOWNLOAD UTILITIES
// ═══════════════════════════════════════════════════════════════
function downloadFile(content, filename, contentType) {
  const a = document.createElement("a");
  const file = new Blob([content], {type: contentType});
  a.href = URL.createObjectURL(file); a.download = filename; a.click();
  URL.revokeObjectURL(a.href);
}
function loadFromStorage(){
  const s = localStorage.getItem('lpg_graph_state');
  if(s){ try{ deserialize(s); } catch(e){} }
}

// ═══════════════════════════════════════════════════════════════
//  GLOBAL KEYBOARD LISTENERS
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
  if(e.ctrlKey || e.metaKey){
    if(e.key==='z' || e.key==='Z'){ e.preventDefault(); App.undo(); }
    if(e.key==='y' || e.key==='Y'){ e.preventDefault(); App.redo(); }
    return;
  }
  switch(e.key){
    case 'Delete': case 'Backspace': App.deleteSelected(); break;
    case 's': case 'S': App.setTool('select'); break;
    case 'n': case 'N': App.setTool('node'); break;
    case 'e': case 'E': App.setTool('edge'); break;
    case 'p': case 'P': App.setTool('pan'); break;
    case 'f': case 'F': App.fitView(); break;
    case 'Escape': State.selected.clear(); State.edgeGhost=null; removeEdgeGhost(); renderAll(); renderInspector(); break;
  }
});

// ═══════════════════════════════════════════════════════════════
//  INITIALIZATION ENTRY
// ═══════════════════════════════════════════════════════════════
(function init(){
  App.setTool('select');
  loadFromStorage();
  if(State.nodes.length===0){
    State.nodes=[
      {id:'nodeA',label:'Node A',x:200,y:200,color:'#1f6feb',r:28,props:{status:'active'}},
      {id:'nodeB',label:'Node B',x:420,y:150,color:'#1a7f37',r:26,props:{}},
      {id:'nodeC',label:'Node C',x:380,y:320,color:'#9e6a03',r:26,props:{}},
    ];
    State.edges=[
      {id:'e1',source:'nodeA',target:'nodeB',label:'link1',directed:true,style:'straight',dash:'solid',arrowSize:'medium'},
      {id:'e2',source:'nodeB',target:'nodeC',label:'link2',directed:true,style:'curved',dash:'solid',arrowSize:'medium'},
    ];
    State.idCounter=4;
  }
  renderAll();
  renderInspector();
})();
</script>
